<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>GLSL Playground</title>
<style>
body{margin:0;background:#111;color:#fff;font-family:monospace;display:flex;height:100vh;overflow:hidden}
#left{width:300px;background:#1a1a1a;overflow:auto;padding:10px;box-sizing:border-box}
#right{flex:1;display:flex;flex-direction:column}
#toolbar{padding:5px;background:#222}
button,input{margin:2px}
#editor{flex:1;width:100%;background:#000;color:#0f0;border:none;outline:none;padding:10px;box-sizing:border-box}
canvas{flex:1;display:block}
.file{cursor:pointer;padding:3px}
.file:hover{background:#333}
</style>
</head>
<body>
<div id="left">
<button onclick="newFolder()">New Folder</button>
<button onclick="newFile()">New File</button>
<div id="tree"></div>
</div>
<div id="right">
<div id="toolbar">
<input type="file" id="uploadImage">
<input type="file" id="uploadVideo">
<button onclick="run()">Run</button>
</div>
<textarea id="editor"></textarea>
<canvas id="gl"></canvas>
</div>
<script>
let fs={name:"root",type:"folder",children:[]}
let current=null

function renderTree(node=fs,el=document.getElementById("tree"),path=[]){
el.innerHTML=""
node.children.forEach((c,i)=>{
let div=document.createElement("div")
div.className="file"
div.textContent=c.name
div.onclick=()=>openNode(path.concat(i))
el.appendChild(div)
if(c.type==="folder"){
let sub=document.createElement("div")
sub.style.marginLeft="10px"
el.appendChild(sub)
renderTree(c,sub,path.concat(i))
}
})
}

function openNode(path){
let n=fs
path.forEach(i=>n=n.children[i])
current=n
if(n.type==="file")editor.value=n.content||""
}

function newFolder(){
let name=prompt("Folder name")
if(!name)return
let target=current&&current.type==="folder"?current:fs
target.children.push({name,type:"folder",children:[]})
renderTree()
}

function newFile(){
let name=prompt("File name")
if(!name)return
let target=current&&current.type==="folder"?current:fs
target.children.push({name,type:"file",content:defaultShader()})
renderTree()
}

function defaultShader(){
return `precision highp float;
uniform vec2 iResolution;
uniform float iTime;
uniform sampler2D iChannel0;
void mainImage(out vec4 fragColor,in vec2 fragCoord){
vec2 uv=fragCoord/iResolution;
vec2 p=uv-0.5;
float a=atan(p.y,p.x);
float r=length(p);
float t=iTime*0.5;
a+=r*3.0;
vec2 q=r*vec2(cos(a),sin(a));
vec3 col=texture(iChannel0,q+0.5).rgb;
fragColor=vec4(col,1.0);
}
void main(){
mainImage(gl_FragColor,gl_FragCoord.xy);
}`
}

let canvas=document.getElementById("gl")
let gl=canvas.getContext("webgl")
function resize(){
canvas.width=canvas.clientWidth
canvas.height=canvas.clientHeight
gl.viewport(0,0,canvas.width,canvas.height)
}
window.onresize=resize
resize()

let vertex=`attribute vec2 p;void main(){gl_Position=vec4(p,0,1);}`
let buffer=gl.createBuffer()
gl.bindBuffer(gl.ARRAY_BUFFER,buffer)
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW)

let program,uniforms={},start=Date.now(),tex

function compile(src){
let vs=gl.createShader(gl.VERTEX_SHADER)
gl.shaderSource(vs,vertex)
gl.compileShader(vs)
let fs=gl.createShader(gl.FRAGMENT_SHADER)
gl.shaderSource(fs,src)
gl.compileShader(fs)
program=gl.createProgram()
gl.attachShader(program,vs)
gl.attachShader(program,fs)
gl.linkProgram(program)
gl.useProgram(program)
let loc=gl.getAttribLocation(program,"p")
gl.enableVertexAttribArray(loc)
gl.vertexAttribPointer(loc,2,gl.FLOAT,false,0,0)
uniforms.res=gl.getUniformLocation(program,"iResolution")
uniforms.time=gl.getUniformLocation(program,"iTime")
uniforms.chan0=gl.getUniformLocation(program,"iChannel0")
}

function run(){
if(current&&current.type==="file")current.content=editor.value
compile(editor.value)
render()
}

function render(){
gl.useProgram(program)
gl.uniform2f(uniforms.res,canvas.width,canvas.height)
gl.uniform1f(uniforms.time,(Date.now()-start)/1000)
if(tex){
gl.activeTexture(gl.TEXTURE0)
gl.bindTexture(gl.TEXTURE_2D,tex)
gl.uniform1i(uniforms.chan0,0)
}
gl.drawArrays(gl.TRIANGLE_STRIP,0,4)
requestAnimationFrame(render)
}

document.getElementById("uploadImage").onchange=e=>{
let file=e.target.files[0]
let img=new Image()
img.onload=()=>{
tex=gl.createTexture()
gl.bindTexture(gl.TEXTURE_2D,tex)
gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,gl.RGBA,gl.UNSIGNED_BYTE,img)
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE)
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE)
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR)
}
img.src=URL.createObjectURL(file)
}

document.getElementById("uploadVideo").onchange=e=>{
let file=e.target.files[0]
let vid=document.createElement("video")
vid.src=URL.createObjectURL(file)
vid.autoplay=true
vid.loop=true
vid.muted=true
vid.play()
tex=gl.createTexture()
function update(){
gl.bindTexture(gl.TEXTURE_2D,tex)
gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,gl.RGBA,gl.UNSIGNED_BYTE,vid)
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE)
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE)
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR)
requestAnimationFrame(update)
}
update()
}

renderTree()
editor.value=defaultShader()
run()
</script>
</body>
</html>
